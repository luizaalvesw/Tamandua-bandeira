     <h1>Tamanduá-bandeira</h1>
    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3b/Myresluger2.jpg" alt="Aqui tem um Tamanduá-bandeira">
    <p style="padding: 30px 200px;">O tamanduá-bandeira uma espécie de mamífero xenartro da família dos mirmecofagídeos, encontrado na América Central e na América do Sul. É a maior das quatro espécies de tamanduás e, junto com as preguiças, está incluído na ordem Pilosa.</p>
